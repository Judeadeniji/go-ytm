name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv

      - name: Install Python dependencies
        run: |
          cd ytm-api
          pip install -r requirements.txt

      - name: Build
        run: make build

      - name: Doctor
        run: YTM_DEV=1 ./bin/ytm doctor

      - name: Run Go Tests
        run: make test

      - name: Run Go Linter
        run: make lint
